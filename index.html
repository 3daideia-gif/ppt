<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batalha Pedra Papel Tesoura</title>
    <style>
        body { 
            margin: 0; 
            /* Mudamos de hidden para auto para permitir o scroll se necessário */
            overflow-y: auto; 
            background: #222; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            min-height: 100vh;
        }
        canvas { 
            background: #333; 
            box-shadow: 0 0 20px rgba(0,0,0,0.5); 
            margin-top: 20px; 
            margin-bottom: 30px; /* Espaço extra na parte de baixo */
            cursor: crosshair; 
            max-width: 95vw; /* Garante que não estoure a largura em celulares */
        }
        #controles { 
            color: white; 
            padding: 15px; 
            text-align: center; 
        }
        button { 
            padding: 12px 24px; 
            font-size: 16px; 
            cursor: pointer; 
            background: #2ecc71; 
            border: none; 
            color: white; 
            border-radius: 5px; 
            font-weight: bold; 
            transition: background 0.3s;
        }
        button:hover { 
            background: #27ae60; 
        }
        #placar {
            font-size: 1.2rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="controles">
        <h2>Simulação Jokenpô</h2>
        <button id="btnIniciar">Reiniciar Batalha</button>
        <p id="placar">Pedra: 20 | Papel: 20 | Tesoura: 20</p>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const btnIniciar = document.getElementById('btnIniciar');
const placar = document.getElementById('placar');

// Configurações adaptáveis
const TAMANHO_ICONE = 24;
const VELOCIDADE = 2;
const TOTAL_CADA = 20;
const ICONES = { pedra: '🪨', papel: '📄', tesoura: '✂️' };

let entidades = [];
let animando = false;

// Ajuste automático do tamanho do canvas
function ajustarCanvas() {
    canvas.width = Math.min(800, window.innerWidth * 0.9);
    canvas.height = Math.min(500, window.innerHeight * 0.6);
}

ajustarCanvas();

class Entidade {
    constructor(tipo, x, y) {
        this.tipo = tipo; 
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * VELOCIDADE * 3;
        this.vy = (Math.random() - 0.5) * VELOCIDADE * 3;
    }

    desenhar() {
        ctx.font = `${TAMANHO_ICONE}px Arial`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(ICONES[this.tipo], this.x, this.y);
    }

    atualizar() {
        this.x += this.vx;
        this.y += this.vy;

        // Colisão com bordas
        if (this.x < 15 || this.x > canvas.width - 15) this.vx *= -1;
        if (this.y < 15 || this.y > canvas.height - 15) this.vy *= -1;
        
        // Garantir que não saiam do canvas
        this.x = Math.max(15, Math.min(canvas.width - 15, this.x));
        this.y = Math.max(15, Math.min(canvas.height - 15, this.y));
    }
}

function inicializar() {
    entidades = [];
    const tipos = ['pedra', 'papel', 'tesoura'];
    
    tipos.forEach(tipo => {
        for (let i = 0; i < TOTAL_CADA; i++) {
            entidades.push(new Entidade(
                tipo, 
                Math.random() * (canvas.width - 60) + 30, 
                Math.random() * (canvas.height - 60) + 30
            ));
        }
    });
    atualizarPlacar();
}

function verificarColisoes() {
    for (let i = 0; i < entidades.length; i++) {
        for (let j = i + 1; j < entidades.length; j++) {
            let a = entidades[i];
            let b = entidades[j];

            let dx = a.x - b.x;
            let dy = a.y - b.y;
            let distancia = Math.sqrt(dx * dx + dy * dy);

            if (distancia < TAMANHO_ICONE) {
                resolverCombate(a, b);
                // Inverter direção para efeito de ricochete
                let tempVx = a.vx;
                let tempVy = a.vy;
                a.vx = b.vx;
                a.vy = b.vy;
                b.vx = tempVx;
                b.vy = tempVy;
            }
        }
    }
}

function resolverCombate(a, b) {
    if (a.tipo === b.tipo) return;

    const regras = {
        pedra: 'tesoura', 
        papel: 'pedra',   
        tesoura: 'papel'  
    };

    if (regras[a.tipo] === b.tipo) {
        b.tipo = a.tipo; 
    } else {
        a.tipo = b.tipo; 
    }
    atualizarPlacar();
}

function atualizarPlacar() {
    const contagem = { pedra: 0, papel: 0, tesoura: 0 };
    entidades.forEach(e => contagem[e.tipo]++);
    placar.innerText = `Pedra: ${contagem.pedra} | Papel: ${contagem.papel} | Tesoura: ${contagem.tesoura}`;
    
    const total = TOTAL_CADA * 3;
    if (contagem.pedra === total || contagem.papel === total || contagem.tesoura === total) {
        animando = false;
        const vencedor = contagem.pedra === total ? "PEDRA" : contagem.papel === total ? "PAPEL" : "TESOURA";
        setTimeout(() => alert(`Fim de jogo! ${vencedor} dominou o mundo!`), 100);
    }
}

function loop() {
    if (!animando) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    entidades.forEach(e => {
        e.atualizar();
        e.desenhar();
    });

    verificarColisoes();
    requestAnimationFrame(loop);
}

btnIniciar.onclick = () => {
    animando = false; // Para o loop atual se existir
    setTimeout(() => {
        inicializar();
        animando = true;
        loop();
    }, 10);
};
