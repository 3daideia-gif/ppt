<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batalha Jokenpô - Versão Final</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --pedra: #95a5a6; --papel: #ffffff; --tesoura: #f1c40f;
            --bg: #121212; --canvas-bg: #1e1e1e;
        }
        body { 
            margin: 0; background: var(--bg); color: white;
            font-family: 'Segoe UI', sans-serif; display: flex; 
            flex-direction: column; align-items: center; min-height: 100vh;
        }
        #ui { text-align: center; padding: 20px; width: 100%; max-width: 600px; }
        .botoes { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        button { 
            padding: 12px 25px; font-size: 14px; cursor: pointer; border: none; 
            color: white; border-radius: 8px; font-weight: bold; transition: 0.2s;
            text-transform: uppercase;
        }
        #btnIniciar { background: #2ecc71; box-shadow: 0 4px #27ae60; }
        #btnIniciar:hover { background: #27ae60; }
        #btnIniciar:active { transform: translateY(2px); box-shadow: 0 2px #27ae60; }
        #btnResetar { background: #e74c3c; box-shadow: 0 4px #c0392b; }
        
        #placar {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            background: #2c3e50; padding: 15px; border-radius: 12px; gap: 10px;
        }
        canvas { 
            background: var(--canvas-bg); border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 95vw;
        }
    </style>
</head>
<body>

    <div id="ui">
        <h2>Simulação Jokenpô</h2>
        <div class="botoes">
            <button id="btnIniciar">🚀 Iniciar</button>
            <button id="btnResetar">🔄 Resetar</button>
        </div>
        <div id="placar">
            <span>🪨 <span id="p-pedra">0</span></span>
            <span>📄 <span id="p-papel">0</span></span>
            <span>✂️ <span id="p-tesoura">0</span></span>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const btnIniciar = document.getElementById('btnIniciar');
const btnResetar = document.getElementById('btnResetar');

const TAMANHO = 28;
const VELOCIDADE = 1.0; 
const TOTAL = 15;

let entidades = [];
let animando = false;
let animationId;

// Códigos dos ícones FontAwesome
const ICONES = { pedra: '\uf255', papel: '\uf256', tesoura: '\uf257' };

function ajustar() {
    canvas.width = Math.min(800, window.innerWidth * 0.95);
    canvas.height = Math.min(500, window.innerHeight * 0.6);
}
ajustar();

class Entidade {
    constructor(tipo) {
        this.tipo = tipo;
        this.r = TAMANHO / 2;
        this.x = Math.random() * (canvas.width - TAMANHO) + this.r;
        this.y = Math.random() * (canvas.height - TAMANHO) + this.r;
        const ang = Math.random() * Math.PI * 2;
        this.vx = Math.cos(ang) * VELOCIDADE;
        this.vy = Math.sin(ang) * VELOCIDADE;
    }
    desenhar() {
        ctx.font = `900 ${TAMANHO}px "Font Awesome 6 Free"`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = this.tipo === 'pedra' ? '#95a5a6' : this.tipo === 'papel' ? '#fff' : '#f1c40f';
        ctx.fillText(ICONES[this.tipo], this.x, this.y);
    }
    mover() {
        this.x += this.vx; this.y += this.vy;
        if (this.x < this.r || this.x > canvas.width - this.r) this.vx *= -1;
        if (this.y < this.r || this.y > canvas.height - this.r) this.vy *= -1;
    }
}

function inicializar() {
    parar();
    entidades = [];
    ['pedra', 'papel', 'tesoura'].forEach(t => {
        for(let i=0; i<TOTAL; i++) entidades.push(new Entidade(t));
    });
    atualizarPlacar();
    render();
}

function parar() {
    animando = false;
    cancelAnimationFrame(animationId);
}

function verificarColisoes() {
    const regras = { pedra: 'tesoura', papel: 'pedra', tesoura: 'papel' };
    for (let i = 0; i < entidades.length; i++) {
        for (let j = i + 1; j < entidades.length; j++) {
            let a = entidades[i], b = entidades[j];
            let dx = a.x - b.x, dy = a.y - b.y;
            let d = Math.sqrt(dx*dx + dy*dy);
            if (d < TAMANHO * 0.8) {
                if (a.tipo !== b.tipo) {
                    if (regras[a.tipo] === b.tipo) b.tipo = a.tipo;
                    else a.tipo = b.tipo;
                    atualizarPlacar();
                }
                [a.vx, b.vx] = [b.vx, a.vx]; [a.vy, b.vy] = [b.vy, a.vy];
            }
        }
    }
}

function atualizarPlacar() {
    const c = { pedra: 0, papel: 0, tesoura: 0 };
    entidades.forEach(e => c[e.tipo]++);
    document.getElementById('p-pedra').innerText = c.pedra;
    document.getElementById('p-papel').innerText = c.papel;
    document.getElementById('p-tesoura').innerText = c.tesoura;
    
    if (animando && (c.pedra === 45 || c.papel === 45 || c.tesoura === 45)) {
        parar();
        alert("Batalha terminada!");
    }
}

function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    entidades.forEach(e => e.desenhar());
}

function loop() {
    if (!animando) return;
    render();
    entidades.forEach(e => { e.mover(); });
    verificarColisoes();
    animationId = requestAnimationFrame(loop);
}

btnIniciar.onclick = () => {
    if (animando) return;
    animando = true;
    loop();
};

btnResetar.onclick = () => inicializar();

// ESPERA A FONTE CARREGAR ANTES DE MOSTRAR TUDO
document.fonts.ready.then(() => {
    inicializar();
});
</script>
</body>
</html>
