<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batalha Jokenpô</title>
    <style>
        body { 
            margin: 0; 
            overflow-y: auto; 
            background: #1a1a1a; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            min-height: 100vh;
            color: white;
        }
        canvas { 
            background: #222; 
            box-shadow: 0 0 30px rgba(0,0,0,0.7); 
            margin: 20px 0;
            border-radius: 8px;
            cursor: crosshair; 
            max-width: 95vw;
        }
        #controles { 
            padding: 20px; 
            text-align: center; 
        }
        .botoes {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 15px;
        }
        button { 
            padding: 12px 25px; 
            font-size: 16px; 
            cursor: pointer; 
            border: none; 
            color: white; 
            border-radius: 5px; 
            font-weight: bold; 
            transition: transform 0.1s, background 0.3s;
        }
        button:active { transform: scale(0.95); }
        #btnIniciar { background: #2ecc71; }
        #btnIniciar:hover { background: #27ae60; }
        #btnResetar { background: #e74c3c; }
        #btnResetar:hover { background: #c0392b; }
        #placar {
            font-size: 1.3rem;
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div id="controles">
        <h2>Simulação Jokenpô</h2>
        <div class="botoes">
            <button id="btnIniciar">🚀 Iniciar Batalha</button>
            <button id="btnResetar">🔄 Resetar Campo</button>
        </div>
        <p id="placar">Aguardando início...</p>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const btnIniciar = document.getElementById('btnIniciar');
const btnResetar = document.getElementById('btnResetar');
const placar = document.getElementById('placar');

const TAMANHO_ICONE = 26;
const VELOCIDADE = 2.5;
const TOTAL_CADA = 18;
const ICONES = { pedra: '🪨', papel: '📄', tesoura: '✂️' };

let entidades = [];
let animando = false;
let animationId;

function ajustarCanvas() {
    canvas.width = Math.min(800, window.innerWidth * 0.95);
    canvas.height = Math.min(500, window.innerHeight * 0.6);
}

window.addEventListener('resize', ajustarCanvas);
ajustarCanvas();

class Entidade {
    constructor(tipo) {
        this.tipo = tipo; 
        this.raio = TAMANHO_ICONE / 2;
        // Posicionamento aleatório evitando as bordas
        this.x = Math.random() * (canvas.width - TAMANHO_ICONE) + this.raio;
        this.y = Math.random() * (canvas.height - TAMANHO_ICONE) + this.raio;
        
        const angulo = Math.random() * Math.PI * 2;
        this.vx = Math.cos(angulo) * VELOCIDADE;
        this.vy = Math.sin(angulo) * VELOCIDADE;
    }

    desenhar() {
        ctx.font = `${TAMANHO_ICONE}px Arial`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(ICONES[this.tipo], this.x, this.y);
    }

    atualizar() {
        this.x += this.vx;
        this.y += this.vy;

        if (this.x <= this.raio || this.x >= canvas.width - this.raio) {
            this.vx *= -1;
            this.x = this.x <= this.raio ? this.raio : canvas.width - this.raio;
        }
        if (this.y <= this.raio || this.y >= canvas.height - this.raio) {
            this.vy *= -1;
            this.y = this.y <= this.raio ? this.raio : canvas.height - this.raio;
        }
    }
}

function inicializar() {
    cancelAnimationFrame(animationId);
    animando = false;
    entidades = [];
    const tipos = ['pedra', 'papel', 'tesoura'];
    
    tipos.forEach(tipo => {
        for (let i = 0; i < TOTAL_CADA; i++) {
            entidades.push(new Entidade(tipo));
        }
    });
    
    atualizarPlacar();
    render(); // Desenha o estado inicial parado
}

function verificarColisoes() {
    for (let i = 0; i < entidades.length; i++) {
        for (let j = i + 1; j < entidades.length; j++) {
            let a = entidades[i];
            let b = entidades[j];

            let dx = a.x - b.x;
            let dy = a.y - b.y;
            let distancia = Math.sqrt(dx * dx + dy * dy);

            if (distancia < TAMANHO_ICONE) {
                resolverCombate(a, b);

                // Troca de vetores de velocidade (ricochete)
                [a.vx, b.vx] = [b.vx, a.vx];
                [a.vy, b.vy] = [b.vy, a.vy];

                // Impedir sobreposição (afastamento físico)
                let overlap = (TAMANHO_ICONE - distancia) / 2;
                let nx = dx / distancia;
                let ny = dy / distancia;
                a.x += nx * overlap;
                a.y += ny * overlap;
                b.x -= nx * overlap;
                b.y -= ny * overlap;
            }
        }
    }
}

function resolverCombate(a, b) {
    if (a.tipo === b.tipo) return;
    const regras = { pedra: 'tesoura', papel: 'pedra', tesoura: 'papel' };

    if (regras[a.tipo] === b.tipo) {
        b.tipo = a.tipo; 
    } else {
        a.tipo = b.tipo; 
    }
    atualizarPlacar();
}

function atualizarPlacar() {
    const contagem = { pedra: 0, papel: 0, tesoura: 0 };
    entidades.forEach(e => contagem[e.tipo]++);
    
    placar.innerHTML = `🪨 ${contagem.pedra} | 📄 ${contagem.papel} | ✂️ ${contagem.tesoura}`;
    
    const total = TOTAL_CADA * 3;
    if (animando && (contagem.pedra === total || contagem.papel === total || contagem.tesoura === total)) {
        animando = false;
        const vencedor = contagem.pedra === total ? "PEDRA 🪨" : contagem.papel === total ? "PAPEL 📄" : "TESOURA ✂️";
        setTimeout(() => alert(`FIM DE JOGO!\nO império do(a) ${vencedor} começou!`), 100);
    }
}

function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    entidades.forEach(e => e.desenhar());
}

function loop() {
    if (!animando) return;
    render();
    entidades.forEach(e => e.atualizar());
    verificarColisoes();
    animationId = requestAnimationFrame(loop);
}

btnIniciar.onclick = () => {
    if (animando) return; // Evita duplicar o loop
    if (entidades.length === 0) inicializar();
    animando = true;
    loop();
};

btnResetar.onclick = () => {
    inicializar();
};

// Inicia o campo ao carregar a página
inicializar();

</script>
</body>
</html>
