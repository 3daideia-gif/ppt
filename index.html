<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batalha Jokenpô Moderna</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --cor-pedra: #bdc3c7; /* Cinza claro metálico */
            --cor-papel: #ecf0f1; /* Branco papel */
            --cor-tesoura: #f1c40f; /* Amarelo ouro */
            --cor-fundo-site: #121212;
            --cor-fundo-canvas: #1e1e1e;
            --cor-ui: #2c3e50;
        }

        body { 
            margin: 0; 
            background: var(--cor-fundo-site); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            color: #ecf0f1;
            min-height: 100vh;
        }

        #ui-jogo {
            text-align: center;
            padding: 30px 20px;
            width: 100%;
            max-width: 800px;
        }

        h2 { margin-top: 0; font-weight: 300; letter-spacing: 2px; text-transform: uppercase; }

        .botoes { 
            display: flex; 
            gap: 15px; 
            justify-content: center; 
            margin-bottom: 25px; 
        }

        button { 
            padding: 12px 28px; 
            font-size: 16px; 
            cursor: pointer; 
            border: none; 
            color: white; 
            border-radius: 6px; 
            font-weight: bold;
            transition: 0.2s ease-in-out;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        #btnIniciar { background: #2ecc71; }
        #btnIniciar:hover { background: #27ae60; transform: translateY(-2px); }
        #btnIniciar:active { transform: translateY(1px); }

        #btnResetar { background: #e74c3c; }
        #btnResetar:hover { background: #c0392b; transform: translateY(-2px); }
        #btnResetar:active { transform: translateY(1px); }
        
        #bloco-placar {
            background: var(--cor-ui);
            padding: 15px 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
            font-size: 1.1rem;
        }

        .item-placar {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Cores dos ícones no placar */
        .icon-pedra { color: var(--cor-pedra); }
        .icon-papel { color: var(--cor-papel); }
        .icon-tesoura { color: var(--cor-tesoura); }

        #gameCanvas { 
            background: var(--cor-fundo-canvas); 
            box-shadow: 0 10px 40px rgba(0,0,0,0.6); 
            border-radius: 15px;
            max-width: 95vw;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

    <div id="ui-jogo">
        <h2>Simulação Jokenpô</h2>
        <div class="botoes">
            <button id="btnIniciar"><i class="fas fa-play"></i> Iniciar</button>
            <button id="btnResetar"><i class="fas fa-redo"></i> Resetar</button>
        </div>
        <div id="bloco-placar">
            <div class="item-placar"><i class="fas fa-hand-rock fa-lg icon-pedra"></i> <span id="qtd-pedra">0</span></div>
            <div class="item-placar"><i class="fas fa-hand-paper fa-lg icon-papel"></i> <span id="qtd-papel">0</span></div>
            <div class="item-placar"><i class="fas fa-hand-scissors fa-lg icon-tesoura"></i> <span id="qtd-tesoura">0</span></div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const btnIniciar = document.getElementById('btnIniciar');
const btnResetar = document.getElementById('btnResetar');

// Seletores do placar moderno
const qtdPedra = document.getElementById('qtd-pedra');
const qtdPapel = document.getElementById('qtd-papel');
const qtdTesoura = document.getElementById('qtd-tesoura');

// CONFIGURAÇÕES
const TAMANHO_ICONE_CANVAS = 28;     
const VELOCIDADE_LENTA = 1.0; 
const TOTAL_CADA = 15;

let entidades = [];
let animando = false;
let animationId;

function ajustarCanvas() {
    // Canvas ligeiramente maior para melhor visualização
    canvas.width = Math.min(900, window.innerWidth * 0.95);
    canvas.height = Math.min(550, window.innerHeight * 0.65);
}
window.addEventListener('resize', ajustarCanvas);
ajustarCanvas();

class Entidade {
    constructor(tipo) {
        this.tipo = tipo;
        this.raio = TAMANHO_ICONE_CANVAS / 2;
        // Posicionamento aleatório inteligente evitando bordas
        this.x = Math.random() * (canvas.width - TAMANHO_ICONE_CANVAS * 2) + this.raio;
        this.y = Math.random() * (canvas.height - TAMANHO_ICONE_CANVAS * 2) + this.raio;
        
        const angulo = Math.random() * Math.PI * 2;
        this.vx = Math.cos(angulo) * VELOCIDADE_LENTA;
        this.vy = Math.sin(angulo) * VELOCIDADE_LENTA;
    }

    desenhar() {
        ctx.save();
        ctx.translate(this.x, this.y);
        
        // Configurando a fonte do Font Awesome para o Canvas
        ctx.font = `900 ${TAMANHO_ICONE_CANVAS}px "Font Awesome 6 Free"`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        // Definindo ícone e cor sólida com base no tipo
        if (this.tipo === 'pedra') {
            ctx.fillStyle = '#bdc3c7'; // Metal cinza
            ctx.fillText('\uf255', 0, 0); // Código Unicode do fa-hand-rock
        } else if (this.tipo === 'papel') {
            ctx.fillStyle = '#ffffff'; // Branco puro
            ctx.fillText('\uf256', 0, 0); // Código Unicode do fa-hand-paper
        } else if (this.tipo === 'tesoura') {
            ctx.fillStyle = '#f1c40f'; // Amarelo tesoura
            ctx.fillText('\uf257', 0, 0); // Código Unicode do fa-hand-scissors
        }
        
        ctx.restore();
    }

    atualizar() {
        this.x += this.vx;
        this.y += this.vy;

        // Colisão com bordas com pequeno buffer
        const buffer = this.raio * 0.8;
        if (this.x <= buffer || this.x >= canvas.width - buffer) {
            this.vx *= -1;
            this.x = this.x <= buffer ? buffer : canvas.width - buffer;
        }
        if (this.y <= buffer || this.y >= canvas.height - buffer) {
            this.vy *= -1;
            this.y = this.y <= buffer ? buffer : canvas.height - buffer;
        }
    }
}

function inicializar() {
    animando = false;
    cancelAnimationFrame(animationId);
    entidades = [];
    ['pedra', 'papel', 'tesoura'].forEach(tipo => {
        for (let i = 0; i < TOTAL_CADA; i++) entidades.push(new Entidade(tipo));
    });
    atualizarPlacar(true); // Modo inicial silencioso
    render();
}

function verificarColisoes() {
    const regras = { pedra: 'tesoura', papel: 'pedra', tesoura: 'papel' };

    for (let i = 0; i < entidades.length; i++) {
        for (let j = i + 1; j < entidades.length; j++) {
            let a = entidades[i];
            let b = entidades[j];
            let dx = a.x - b.x;
            let dy = a.y - b.y;
            let dist = Math.sqrt(dx*dx + dy*dy);

            // Colisão baseada no tamanho do ícone
            if (dist < TAMANHO_ICONE_CANVAS * 0.9) {
                // Combate
                if (a.tipo !== b.tipo) {
                    if (regras[a.tipo] === b.tipo) b.tipo = a.tipo;
                    else a.tipo = b.tipo;
                    atualizarPlacar();
                }
